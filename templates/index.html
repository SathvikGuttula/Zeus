<!DOCTYPE html>
<html>
<head>
    <title>WiFi Activity Monitor</title>
    <script src="https://cdn.socket.io/4.0.1/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<h2>📡 Live WiFi Activity Monitor</h2>

<h3 id="status">Status: Waiting...</h3>

<canvas id="chart" width="600" height="300"></canvas>

<div id="heatmap" style="width:200px;height:200px;background-color:blue;margin-top:20px;"></div>

<script>
const socket = io();

let labels = [];
let data = [];

const ctx = document.getElementById('chart').getContext('2d');

const chart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: labels,
        datasets: [{
            label: 'RSSI',
            data: data
        }]
    }
});

socket.on("update", (msg) => {
    let rssi = msg.rssi;
    let pred = msg.prediction;
    let intensity = msg.intensity;

    // Update graph
    labels.push('');
    data.push(rssi);

    if (labels.length > 20) {
        labels.shift();
        data.shift();
    }

    chart.update();

    // Update status
    let text = "";
    if (pred == 1) text = "😴 No Activity";
    else if (pred == 2) text = "👤 Normal Activity";
    else text = "🚨 Suspicious Activity";

    document.getElementById("status").innerText = "Status: " + text;

    // Heatmap effect (color intensity)
    let color = Math.min(255, intensity * 5);
    document.getElementById("heatmap").style.backgroundColor =
        `rgb(${color}, 0, ${255 - color})`;
});
</script>

</body>
</html>
